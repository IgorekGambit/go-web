{{define "base"}}
<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{if .Title}}{{.Title}} — go-web{{else}}go-web{{end}}</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<style>
		:root {
			--app-nav-height: 56px;
		}
		body.app-shell {
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			background: linear-gradient(165deg, #f8f9fa 0%, #e9ecef 45%, #dee2e6 100%);
		}
		.app-main { flex: 1 0 auto; padding-top: 1.5rem; padding-bottom: 2rem; }
		.app-footer {
			flex-shrink: 0;
			background: rgba(255,255,255,.92);
			backdrop-filter: blur(8px);
			border-top: 1px solid rgba(0,0,0,.06);
		}
		.navbar-brand { font-weight: 600; letter-spacing: -0.02em; }
		.page-card {
			border: none;
			border-radius: 0.75rem;
			box-shadow: 0 0.125rem 2rem rgba(13, 110, 253, 0.08), 0 0.25rem 0.5rem rgba(0,0,0,.06);
		}
		.badge-db { font-weight: 500; font-size: 0.8rem; }
	</style>
</head>
<body class="app-shell">
	<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
		<div class="container">
			<a class="navbar-brand" href="/">go-web</a>
			<span class="navbar-text text-white-50 small d-none d-md-inline">sandbox / учебный проект</span>
		</div>
	</nav>
	<main class="app-main">
		{{template "content" .}}
	</main>
	<footer class="app-footer py-3 mt-auto">
		<div class="container small text-muted text-center">
			go-web · серверный рендер · {{.RenderedAt}}
		</div>
	</footer>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
{{end}}
